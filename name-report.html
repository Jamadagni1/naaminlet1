<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <script>
        (() => {
            const preferredLang = localStorage.getItem("language") || "en";
            document.documentElement.lang = preferredLang;
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Name Report - Naamin</title>
    <meta name="description" content="Detailed name reports with meaning, origin, pronunciation, numerology, and brand relevance." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,600;0,700&family=Poppins:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
    <style>
        .report-page {
            min-height: 100vh;
            padding-top: calc(var(--header-height) + 18px);
            background:
                radial-gradient(circle at 6% 5%, rgba(193, 132, 243, 0.16), transparent 32%),
                radial-gradient(circle at 94% 0%, rgba(108, 43, 217, 0.13), transparent 30%),
                linear-gradient(160deg, #f7f0ff 0%, #eef4ff 44%, #ffffff 100%);
        }

        .report-wrap {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 82px;
            display: grid;
            gap: 26px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(108, 43, 217, 0.12);
            box-shadow: 0 18px 48px rgba(31, 27, 46, 0.08);
            backdrop-filter: blur(8px);
            border-radius: 24px;
        }

        .report-hero-panel {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 22px;
            padding: 28px;
            position: relative;
            overflow: hidden;
        }

        .report-hero-panel::after {
            content: "";
            position: absolute;
            inset: auto -110px -110px auto;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(193, 132, 243, 0.32), transparent 72%);
            pointer-events: none;
        }

        .report-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent-primary);
            background: rgba(108, 43, 217, 0.1);
        }

        .report-hero h1 {
            margin: 14px 0 12px;
            line-height: 1.12;
            font-size: clamp(2rem, 4.2vw, 3.45rem);
            color: var(--text-dark);
        }

        .report-hero p {
            margin: 0;
            color: var(--text-medium);
            font-size: 1.04rem;
            max-width: 62ch;
        }

        .hero-highlights {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .hero-highlights span {
            padding: 8px 12px;
            border-radius: 999px;
            background: #fff;
            border: 1px solid rgba(108, 43, 217, 0.16);
            color: var(--text-dark);
            font-size: 0.88rem;
            font-weight: 600;
        }

        .hero-actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .hero-actions .btn {
            min-width: 188px;
            justify-content: center;
        }

        .report-mock {
            background: linear-gradient(162deg, #ffffff 0%, #f8f3ff 100%);
            border: 1px solid rgba(108, 43, 217, 0.16);
            border-radius: 20px;
            padding: 18px;
            box-shadow: 0 16px 34px rgba(108, 43, 217, 0.14);
            position: relative;
        }

        .mock-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--accent-primary);
            font-weight: 700;
            margin-bottom: 12px;
        }

        .mock-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .mock-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .mock-score {
            font-size: 0.8rem;
            font-weight: 700;
            padding: 6px 10px;
            border-radius: 999px;
            color: #fff;
            background: var(--accent-gradient);
        }

        .mock-list {
            display: grid;
            gap: 8px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .mock-list li {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            background: #fff;
            padding: 9px 11px;
            border-radius: 10px;
            border: 1px solid rgba(108, 43, 217, 0.1);
            font-size: 0.88rem;
        }

        .mock-list strong {
            color: var(--text-dark);
            text-align: right;
        }

        .trust-strip {
            padding: 14px 18px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 10px;
        }

        .trust-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 0.93rem;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(108, 43, 217, 0.1);
        }

        .trust-item i {
            color: var(--accent-primary);
        }

        .section-title {
            font-size: clamp(1.55rem, 2.4vw, 2.2rem);
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .section-intro {
            color: var(--text-medium);
            margin-bottom: 16px;
        }

        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(228px, 100%), 1fr));
            gap: 14px;
        }
    </style>
</head>
<body data-theme="light">
</body>
</html>
