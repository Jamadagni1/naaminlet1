<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Naamin</title>

  <style>
    :root {
      /* Default theme - Boy (Purple/Blue) */
      --theme-bg: #b4a7c8;
      --theme-gradient: linear-gradient(135deg, #7c3aed, #9333ea);
      --theme-gradient-hover: linear-gradient(135deg, #6d28d9, #7c3aed);
      --theme-primary: #7c3aed;
      --theme-glow: rgba(124, 58, 237, 0.35);
    }

    /* Girl theme - Pink */
    /* Girl theme - Pink (Removed) */

    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: var(--theme-bg);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      transition: background 0.3s ease;
    }

    /* BACK ARROW */
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 42px;
      height: 42px;
      background: #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      text-decoration: none;
      color: #1f2937;
      font-size: 20px;
      font-weight: bold;
      transition: transform 0.2s ease;
    }

    .back-btn:hover {
      transform: scale(1.05);
    }

    .card {
      background: #ffffff;
      width: 380px;
      padding: 35px;
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #1f2937;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 16px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    input:focus {
      border-color: var(--theme-primary);
      box-shadow: 0 0 0 3px var(--theme-glow);
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: var(--theme-gradient);
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: var(--theme-gradient-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px var(--theme-glow);
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #374151;
    }

    .footer a {
      color: var(--theme-primary);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s ease;
    }

    .footer a:hover {
      text-decoration: underline;
      opacity: 0.8;
    }
  </style>

  <script>
    // Gender theme logic removed to enforce consistent purple theme
    (function () {
      // document.documentElement.removeAttribute('data-theme');
    })();
  </script>
</head>

<body>

  <!-- BACK ARROW -->
  <a href="index.html" class="back-btn">&#8592;</a>

  <div class="card">
    <h2>Log in to Naamin</h2>

    <form>
      <input type="email" placeholder="Email address" required />
      <input type="password" placeholder="Password" required />
      <button type="submit">Log In</button>
    </form>

    <div class="footer">
      Don’t have an account?
      <a href="signup.html">Sign up</a>
    </div>
  </div>

</body>

</html>
