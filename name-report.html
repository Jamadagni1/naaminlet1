<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <script>
        (() => {
            const preferredLang = localStorage.getItem("language") || "en";
            document.documentElement.lang = preferredLang;
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Name Report - Naamin</title>
    <meta name="description" content="Detailed name reports with meaning, origin, pronunciation, numerology, and brand relevance." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,600;0,700&family=Poppins:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
    <style>
        .report-page {
            min-height: 100vh;
            padding-top: calc(var(--header-height) + 18px);
            background:
                radial-gradient(circle at 6% 5%, rgba(193, 132, 243, 0.16), transparent 32%),
                radial-gradient(circle at 94% 0%, rgba(108, 43, 217, 0.13), transparent 30%),
                linear-gradient(160deg, #f7f0ff 0%, #eef4ff 44%, #ffffff 100%);
        }

        .report-wrap {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 82px;
            display: grid;
            gap: 26px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(108, 43, 217, 0.12);
            box-shadow: 0 18px 48px rgba(31, 27, 46, 0.08);
            backdrop-filter: blur(8px);
            border-radius: 24px;
        }

        .report-hero-panel {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 22px;
            padding: 28px;
            position: relative;
            overflow: hidden;
        }

        .report-hero-panel::after {
            content: "";
            position: absolute;
            inset: auto -110px -110px auto;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(193, 132, 243, 0.32), transparent 72%);
            pointer-events: none;
        }

        .report-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent-primary);
            background: rgba(108, 43, 217, 0.1);
        }

        .report-hero h1 {
            margin: 14px 0 12px;
            line-height: 1.12;
            font-size: clamp(2rem, 4.2vw, 3.45rem);
            color: var(--text-dark);
        }

        .report-hero p {
            margin: 0;
            color: var(--text-medium);
            font-size: 1.04rem;
            max-width: 62ch;
        }

        .hero-highlights {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .hero-highlights span {
            padding: 8px 12px;
            border-radius: 999px;
            background: #fff;
            border: 1px solid rgba(108, 43, 217, 0.16);
            color: var(--text-dark);
            font-size: 0.88rem;
            font-weight: 600;
        }

        .hero-actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .hero-actions .btn {
            min-width: 188px;
            justify-content: center;
        }

        .report-mock {
            background: linear-gradient(162deg, #ffffff 0%, #f8f3ff 100%);
            border: 1px solid rgba(108, 43, 217, 0.16);
            border-radius: 20px;
            padding: 18px;
            box-shadow: 0 16px 34px rgba(108, 43, 217, 0.14);
            position: relative;
        }

        .mock-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--accent-primary);
            font-weight: 700;
            margin-bottom: 12px;
        }

        .mock-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .mock-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .mock-score {
            font-size: 0.8rem;
            font-weight: 700;
            padding: 6px 10px;
            border-radius: 999px;
            color: #fff;
            background: var(--accent-gradient);
        }

        .mock-list {
            display: grid;
            gap: 8px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .mock-list li {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            background: #fff;
            padding: 9px 11px;
            border-radius: 10px;
            border: 1px solid rgba(108, 43, 217, 0.1);
            font-size: 0.88rem;
        }

        .mock-list strong {
            color: var(--text-dark);
            text-align: right;
        }

        .trust-strip {
            padding: 14px 18px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 10px;
        }

        .trust-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 0.93rem;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(108, 43, 217, 0.1);
        }

        .trust-item i {
            color: var(--accent-primary);
        }

        .section-title {
            font-size: clamp(1.55rem, 2.4vw, 2.2rem);
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .section-intro {
            color: var(--text-medium);
            margin-bottom: 16px;
        }

        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(228px, 100%), 1fr));
            gap: 14px;
        }

        .report-card {
            background: #fff;
            border-radius: 16px;
            border: 1px solid rgba(108, 43, 217, 0.12);
            padding: 18px;
            transition: transform .25s ease, box-shadow .25s ease;
            box-shadow: 0 10px 22px rgba(31, 27, 46, 0.06);
        }

        .report-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 30px rgba(108, 43, 217, 0.14);
        }

        .report-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, rgba(193, 132, 243, 0.2), rgba(108, 43, 217, 0.16));
            color: var(--accent-primary);
            font-size: 1.12rem;
            margin-bottom: 10px;
        }

        .report-card h3 {
            margin-bottom: 7px;
            font-size: 1.03rem;
            color: var(--text-dark);
        }

        .report-card p {
            margin: 0;
            color: var(--text-medium);
            line-height: 1.55;
            font-size: 0.94rem;
        }

        .process-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(200px, 100%), 1fr));
            gap: 14px;
        }

        .process-card {
            background: #fff;
            border: 1px solid rgba(108, 43, 217, 0.12);
            border-radius: 16px;
            padding: 18px;
            position: relative;
        }

        .process-no {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #fff;
            background: var(--accent-gradient);
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .process-card h4 {
            margin-bottom: 6px;
            color: var(--text-dark);
            font-size: 1rem;
        }

        .process-card p {
            margin: 0;
            font-size: 0.92rem;
            color: var(--text-medium);
        }

        .delivery-grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 18px;
            align-items: stretch;
        }

        .delivery-card {
            background: #fff;
            border-radius: 18px;
            padding: 20px;
            border: 1px solid rgba(108, 43, 217, 0.12);
        }

        .deliverables {
            display: grid;
            gap: 10px;
            margin-top: 14px;
        }

        .deliverable {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(108, 43, 217, 0.05);
            border: 1px solid rgba(108, 43, 217, 0.1);
        }

        .deliverable i {
            margin-top: 2px;
            color: var(--accent-primary);
        }

        .preview-stack {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .preview-stack img {
            width: 100%;
            border-radius: 14px;
            border: 1px solid rgba(108, 43, 217, 0.12);
            box-shadow: 0 8px 24px rgba(31, 27, 46, 0.08);
            height: 170px;
            object-fit: cover;
        }

        .faq-list {
            display: grid;
            gap: 10px;
        }

        .faq-item {
            border: 1px solid rgba(108, 43, 217, 0.14);
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
        }

        .faq-trigger {
            width: 100%;
            border: 0;
            background: transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            font: inherit;
            font-weight: 700;
            color: var(--text-dark);
            padding: 14px 16px;
            cursor: pointer;
            text-align: left;
        }

        .faq-trigger i {
            color: var(--accent-primary);
            transition: transform .2s ease;
        }

        .faq-item.open .faq-trigger i {
            transform: rotate(180deg);
        }

        .faq-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height .24s ease;
            color: var(--text-medium);
            padding: 0 16px;
        }

        .faq-content p {
            margin: 0 0 14px;
            font-size: 0.94rem;
        }

        .report-cta-band {
            padding: 24px;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            border-radius: 22px;
            background: linear-gradient(138deg, rgba(108, 43, 217, 0.95), rgba(193, 132, 243, 0.95));
            color: #fff;
            box-shadow: 0 18px 38px rgba(108, 43, 217, 0.3);
        }

        .report-cta-band h3 {
            color: #fff;
            margin-bottom: 4px;
        }

        .report-cta-band p {
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
        }

        .report-cta-band .btn-login {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.45);
            color: #fff;
        }

        @media (max-width: 980px) {
            .report-hero-panel,
            .delivery-grid {
                grid-template-columns: 1fr;
            }

            .report-wrap {
                width: calc(100% - 24px);
                padding-top: 16px;
            }
        }

        @media (max-width: 700px) {
            .report-page {
                padding-top: calc(var(--header-height) + 10px);
            }

            .report-hero-panel,
            .glass-panel {
                border-radius: 18px;
            }

            .report-hero-panel {
                padding: 16px;
            }

            .hero-highlights {
                gap: 8px;
            }

            .hero-highlights span {
                font-size: 0.8rem;
                padding: 7px 10px;
            }

            .hero-actions .btn {
                width: 100%;
                min-width: 0;
            }

            .trust-strip {
                padding: 12px;
                grid-template-columns: 1fr;
            }

            .preview-stack {
                grid-template-columns: 1fr;
            }

            .preview-stack img {
                height: 190px;
            }

            .report-cta-band {
                padding: 18px;
            }
        }
    </style>
</head>
<body data-theme="light">
</body>
</html>
