<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Naamin</title>

  <style>
    :root {
      /* Default theme - Boy (Purple/Blue) */
      --theme-bg: #EEF4FF;
      --theme-gradient: linear-gradient(135deg, #C184F3, #6C2BD9);
      --theme-gradient-hover: linear-gradient(135deg, #B173EE, #5B24B6);
      --theme-primary: #6C2BD9;
      --theme-glow: rgba(108, 43, 217, 0.35);
    }

    /* Girl theme - Pink */
    /* Girl theme - Pink (Removed) */

    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: var(--theme-bg);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      transition: background 0.3s ease;
    }

    /* BACK ARROW */
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 42px;
      height: 42px;
      background: #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      text-decoration: none;
      color: #1f2937;
      font-size: 20px;
      font-weight: bold;
      transition: transform 0.2s ease;
    }

    .back-btn:hover {
      transform: scale(1.05);
    }

    .card {
      background: #ffffff;
      width: 380px;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    h2 {
      text-align: center;
      margin-bottom: 22px;
      color: #1f2937;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    input:focus {
      border-color: var(--theme-primary);
      box-shadow: 0 0 0 3px var(--theme-glow);
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--theme-gradient);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      background: var(--theme-gradient-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px var(--theme-glow);
    }

    .footer {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: #4b5563;
    }

    .footer a {
      color: var(--theme-primary);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s ease;
    }

    .footer a:hover {
      text-decoration: underline;
      opacity: 0.8;
    }

    .google-btn {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .google-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(108, 43, 217, 0.18);
    }

    #auth-message {
      min-height: 18px;
      margin: 12px 0 0;
      font-size: 13px;
      text-align: center;
      color: #111827;
    }

    #auth-message[data-type="error"] {
      color: #b91c1c;
    }

    #auth-message[data-type="success"] {
      color: #166534;
    }

  </style>

  <script>
    // Gender theme logic removed to enforce consistent purple theme
    (function () {
      // document.documentElement.removeAttribute('data-theme');
    })();
  </script>
</head>

<body data-auth="signup">

  <!-- BACK ARROW -->
  <a href="index.html" class="back-btn">&#8592;</a>

  <div class="card">
    <h2>Create your account</h2>

    <form id="signup-form">
      <input id="signup-name" type="text" placeholder="Full name" required />
      <input id="signup-email" type="email" placeholder="Email address" required />
      <input id="signup-password" type="password" placeholder="Password (min 8 characters)" required />
      <input id="signup-confirm" type="password" placeholder="Confirm password" required />
      <button type="submit">Sign Up</button>
    </form>
    <button id="google-auth-btn" class="google-btn" type="button">
      <span>Continue with Google</span>
    </button>
    <p id="auth-message" role="alert" aria-live="polite"></p>

    <div class="footer">
      Already have an account?
      <a href="login.html">Log in</a>
    </div>
  </div>

  <script type="module" src="auth.js"></script>
</body>

</html>
